<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        @font-face {
            font-family: 'Norse';
            src: url('fonts/Norse-Bold.woff2') format('woff2'),
                url('fonts/Norse-Bold.woff') format('woff'),
                url('fonts/Norse-Bold.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Luperca';
            src: url('fonts/NyghtSerif-Medium.woff2') format('woff2'),
                url('fonts/NyghtSerif-Medium.woff') format('woff'),
                url('fonts/NyghtSerif-Medium.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
    </style>
    <link rel="preload" href="fonts/Norse-Bold.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="fonts/NyghtSerif-Medium.woff2" as="font" type="font/woff2" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign-up form</title>
</head>
<body>
    <div class="bg-wrapper">
        <div class="logo">
            <div class="logo-container"><img src="images/tealand-logo.png" alt="tea land logo with larger background of teapot pouring tea in a cup"></div>
            <h1>TEA LAND</h1>
        </div>
        <p class="attr"><a href="https://www.freepik.com/free-photo/tea-with-delights-colorful-surface_14628202.htm#from_element=cross_selling__photo" target="_blank" >Image by azerbaijan_stockers on Freepik</a></p>
    </div>
    <div class="container">
        <div class="section">
            <p>now it's your turn to take the step, and officially join the tea land community. by completing this sign up form you will be able to enjoy the privilege of being a tea lander.</p>
            <p><em>sign now!</em></p>
        </div>
        <div class="form-container">
            <p>Let's do this</p>
            <form class="sign-up section">
                <div class="form-control">
                    <label for="fname">First name</label>
                    <input type="text"
                        id="fname"
                        required
                        minlength="2"
                        maxlength="30"
                    />
                </div>
                <div class="form-control">
                    <label for="lname">Last name</label>
                    <input type="text"
                        id="lname"
                        required
                        minlength="2"
                        maxlength="30"
                    />
                </div>
                <div class="form-control">
                    <label for="email">Email</label>
                    <input type="email"
                        id="email"
                        autocomplete="email"
                    />
                </div>
                <div class="form-control">
                    <label for="phone">Phone number</label>
                    <input type="tel"
                        id="phone"
                        autocomplete="tel"
                        placeholder="+12334567890"
                        pattern="^\+\d{1,15}$"
                        title="Please use the international format: a '+' followed by up to 15 digits (e.g., +15551234567)."
                    />
                </div>
                <div class="form-control">
                    <label for="password">Password</label>
                    <input type="password"
                        id="password"
                        required
                        minlength="8"
                        maxlength="20"
                        pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[A-Za-z\d@$!%*?& ]{8,20}$"
                        title="your password must have at least 8 characters, includes at least one number,one uppercase letter, and one lowercase letter."
                    />
                </div>
                <div class="form-control">
                    <label for="password-confirm">Confirm password</label>
                    <input type="password"
                        id="password-confirm"
                        required
                        minlength="8"
                        maxlength="20"
                        pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[A-Za-z\d@$!%*?& ]{8,20}$"
                        title="please match you password"
                    />
                </div>
            </form>
        </div>
        <div class="section"></div>
        
    </div>
</body>
</html>
